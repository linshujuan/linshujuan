name: Update README (recent stars)

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 22:30（北京时间次日 06:30）刷新一次
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate recent stars section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAR_USER: linshujuan
          STAR_COUNT: "8"
        run: python .github/scripts/update_stars.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh recent stars ⭐"
          commit_user_name: "readme-bot 🤖"
          commit_user_email: "actions@github.com"
          file_pattern: README.md
